<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Almeida - Cardápio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        :root { --cor-fundo: #f2e4d8; --cor-texto: #5d4037; --cor-botao: #8d6e63; }
        body { margin: 0; background: var(--cor-fundo); font-family: 'Poppins', sans-serif; color: var(--cor-texto); text-align: center; }
        
        /* HOME */
        #home { padding: 40px 20px; }
        .logo-header img { width: 150px; height: auto; margin-bottom: 20px; }
        .card-sobre { background: white; padding: 25px; border-radius: 25px; max-width: 500px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .lu-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        
        /* SELETOR */
        #seletor-page { display: none; padding: 40px 20px; }
        .moldura { width: 280px; height: 380px; background: white; border-radius: 20px; margin: 20px auto; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .moldura img { width: 100%; height: 100%; object-fit: cover; }
        .controles { display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        .btn { background: var(--cor-botao); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 20px; }
        .seta { background: var(--cor-botao); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <section id="home">
        <div class="logo-header"><img src="logo.png" alt="Logo"></div>
        <div class="card-sobre">
            <img src="foto_luana.png" class="lu-img" alt="Luana">
            <h2 style="font-family: 'Playfair Display';">Luana Almeida</h2>
            <p>Seja bem-vindo ao meu cardápio de Páscoa!</p>
        </div>
        <button class="btn" onclick="irPara('seletor-page')">Ver Cardápio</button>
    </section>

    <section id="seletor-page">
        <h2 style="font-family: 'Playfair Display';">Escolha a Linha</h2>
        <div class="controles">
            <button class="seta" onclick="mudar(-1)">&#10094;</button>
            <div class="moldura">
                <img id="foto-capa" src="capa_gourmet.png">
            </div>
            <button class="seta" onclick="mudar(1)">&#10095;</button>
        </div>
        <h3 id="nome-cat">Linha Gourmet</h3>
        <button class="btn">Entrar nesta categoria</button>
        <p onclick="irPara('home')" style="text-decoration: underline; cursor: pointer; margin-top: 20px;">Voltar</p>
    </section>

    <script>
        const cats = [
            {n: "Linha Gourmet", i: "capa_gourmet.png"},
            {n: "Linha Premium", i: "capa_premium.png"},
            {n: "Cestas Especiais", i: "capa_cestas.png"},
            {n: "Lembrancinhas", i: "capa_lembrancinhas.png"}
        ];
        let idx = 0;

        function irPara(id) {
            document.getElementById('home').style.display = (id === 'home') ? 'block' : 'none';
            document.getElementById('seletor-page').style.display = (id === 'seletor-page') ? 'block' : 'none';
        }

        function mudar(dir) {
            idx = (idx + dir + cats.length) % cats.length;
            document.getElementById('foto-capa').src = cats[idx].i;
            document.getElementById('nome-cat').innerText = cats[idx].n;
        }
    </script>
</body>
</html>
