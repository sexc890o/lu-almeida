<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Almeida - Cardápio Interativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap');
        :root { --cor-fundo: #f2e4d8; --cor-texto: #5d4037; --cor-botao: #8d6e63; }
        body { margin: 0; background: var(--cor-fundo); font-family: 'Poppins', sans-serif; color: var(--cor-texto); text-align: center; }
        
        #home, #seletor-page { padding: 40px 20px; }
        .logo-header img { width: 180px; margin-bottom: 20px; }
        .sobre-mim { background: white; padding: 30px; border-radius: 30px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .lu-img { width: 150px; border-radius: 20px; margin-bottom: 15px; }

        .moldura { width: 280px; height: 380px; background: white; border-radius: 20px; margin: 20px auto; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .moldura img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        
        .controles { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .seta { background: var(--cor-botao); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .btn { background: var(--cor-botao); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

    <section id="home">
        <div class="logo-header">
            <img src="SITE_CLIENTE/logo.png.png" alt="Logo">
        </div>
        <div class="sobre-mim">
            <img src="SITE_CLIENTE/foto_luana.png.png" class="lu-img" alt="Luana">
            <h2 style="font-family: 'Playfair Display';">Quem Sou</h2>
            <p>Olá! Sou a Luana Almeida. Baiana adotada por Niterói...</p>
        </div>
        <button class="btn" onclick="irPara('seletor-page')">Veja nosso cardápio</button>
    </section>

    <section id="seletor-page" style="display:none;">
        <h2 style="font-family: 'Playfair Display';">Escolha uma categoria</h2>
        <div class="controles">
            <button class="seta" onclick="mudar(-1)">&#10094;</button>
            <div class="moldura">
                <img id="img-capa" src="SITE_CLIENTE/capa_gourmet.png.png">
            </div>
            <button class="seta" onclick="mudar(1)">&#10095;</button>
        </div>
        <h3 id="nome-txt">Linha Gourmet</h3>
        <button class="btn">Entrar nesta categoria</button>
        <p onclick="irPara('home')" style="text-decoration: underline; cursor: pointer; margin-top: 20px;">Voltar</p>
    </section>

    <script>
        const pastas = "SITE_CLIENTE/";
        const cats = [
            {n: "Linha Gourmet", i: pastas + "capa_gourmet.png.png"},
            {n: "Linha Premium", i: pastas + "capa_premium.png.png"},
            {n: "Cestas Especiais", i: pastas + "capa_cestas.png.png"},
            {n: "Lembrancinhas", i: pastas + "capa_lembrancinhas.png.png"}
        ];
        let idx = 0;

        function irPara(id) {
            document.getElementById('home').style.display = (id === 'home') ? 'block' : 'none';
            document.getElementById('seletor-page').style.display = (id === 'seletor-page') ? 'block' : 'none';
        }

        function mudar(dir) {
            idx = (idx + dir + cats.length) % cats.length;
            const img = document.getElementById('img-capa');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = cats[idx].i;
                document.getElementById('nome-txt').innerText = cats[idx].n;
                img.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
