<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Almeida - Cardápio Interativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --cor-fundo: #f2e4d8;
            --cor-texto: #5d4037;
            --cor-caixa: #ffffff;
            --cor-botao: #8d6e63;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cor-fundo);
            font-family: 'Poppins', sans-serif;
            color: var(--cor-texto);
            overflow-x: hidden;
        }

        /* --- PÁGINA 1: HOME --- */
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .logo-header { margin-top: 50px; width: 180px; }
        .logo-header img { width: 100%; }

        .sobre-mim-container {
            display: flex;
            align-items: center;
            background: var(--cor-caixa);
            padding: 30px;
            border-radius: 30px;
            max-width: 700px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .luana-img { width: 200px; margin-right: 30px; }
        .sobre-texto h2 { font-family: 'Playfair Display', serif; margin-top: 0; }

        /* --- PÁGINA 2: SELETOR (Escondida inicialmente) --- */
        #seletor-page {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .carousel-container {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        .capa-display {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .capa-display img {
            width: 100%;
            display: block;
        }

        .seta {
            background: var(--cor-botao);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .seta:hover { background: var(--cor-texto); }

        /* BOTÕES GERAIS */
        .btn-acao {
            background-color: var(--cor-botao);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(141, 110, 99, 0.3);
        }

        @media (max-width: 600px) {
            .sobre-mim-container { flex-direction: column; text-align: center; }
            .luana-img { margin-right: 0; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <section id="home">
        <div class="logo-header">
            <img src="logo.png" alt="Logo Lu Almeida">
        </div>
        <div class="sobre-mim-container">
            <img src="luana_estrela.png" class="luana-img" alt="Luana Almeida">
            <div class="sobre-texto">
                <h2>Quem Sou</h2>
                <p><i>Olá! Sou a Luana Almeida. Baiana que há quase 20 anos foi adotada por Niterói...</i></p>
            </div>
        </div>
        <button class="btn-acao" onclick="abrirCardapio()">Veja nosso cardápio</button>
    </section>

    <section id="seletor-page">
        <h2 style="font-family: 'Playfair Display';">Escolha uma categoria</h2>
        
        <div class="carousel-container">
            <button class="seta" onclick="mudarCapa(-1)">&#10094;</button>
            
            <div class="capa-display">
                <img id="imagem-capa" src="capa_gourmet.png" alt="Linha Gourmet">
            </div>
            
            <button class="seta" onclick="mudarCapa(1)">&#10095;</button>
        </div>

        <button class="btn-acao" id="btn-entrar">Entrar nesta categoria</button>
        <p style="margin-top: 20px; cursor: pointer; text-decoration: underline;" onclick="voltarHome()">Voltar</p>
    </section>

    <script>
        // Lista das capas (Páginas 3, 5, 8 e 10 do PDF)
        const categorias = [
            { nome: "Linha Gourmet", img: "capa_gourmet.png" },
            { nome: "Linha Premium", img: "capa_premium.png" },
            { nome: "Cestas Especiais", img: "capa_cestas.png" },
            { nome: "Lembrei de Você", img: "capa_lembrancinhas.png" }
        ];

        let indiceAtual = 0;

        function abrirCardapio() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('seletor-page').style.display = 'flex';
        }

        function voltarHome() {
            document.getElementById('seletor-page').style.display = 'none';
            document.getElementById('home').style.display = 'flex';
        }

        function mudarCapa(direcao) {
            indiceAtual += direcao;
            
            if (indiceAtual < 0) indiceAtual = categorias.length - 1;
            if (indiceAtual >= categorias.length) indiceAtual = 0;

            const imgElement = document.getElementById('imagem-capa');
            
            // Efeito suave de troca
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = categorias[indiceAtual].img;
                imgElement.alt = categorias[indiceAtual].nome;
                imgElement.style.opacity = 1;
            }, 200);
        }

        document.getElementById('btn-entrar').onclick = function() {
            alert("Você escolheu: " + categorias[indiceAtual].nome + ". Próximo passo: mostrar os produtos desta categoria!");
        };
    </script>

</body>
</html>
